name: CurrentCoach
options:
  bundleIdPrefix: com.mcbrideracing
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.mcbrideracing.current-coach
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    INFOPLIST_KEY_CFBundleDisplayName: "Current Coach"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.sports"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    TARGETED_DEVICE_FAMILY: "1"
targets:
  CurrentCoach:
    type: application
    platform: iOS
    sources:
      - CurrentCoach
    settings:
      base:
        PRODUCT_NAME: CurrentCoach
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Current Coach uses your location to measure tidal current speed and direction."
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Current Coach needs background location access to continue measuring tidal current when the app is minimized."
        INFOPLIST_KEY_UIBackgroundModes: "location"
    info:
      path: CurrentCoach/Info.plist
      properties:
        UIBackgroundModes:
          - location
  CurrentCoachTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CurrentCoachTests
    dependencies:
      - target: CurrentCoach
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CurrentCoach.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CurrentCoach"
        BUNDLE_LOADER: "$(TEST_HOST)"
